<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" href="/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="robots" content="noindex, nofollow">
<title>Send Invoice — Ready Tote Oklahoma (Internal)</title>
<style>
  :root{--ink:#1E1B18;--gold:#C99A32;--cream:#F5F1E7;--steel:#6B6259;--line:rgba(30,27,24,0.15);}
  *{box-sizing:border-box;}
  body{font-family:Arial,Helvetica,sans-serif;background:var(--cream);color:var(--ink);margin:0;padding:32px 16px;}
  .card{max-width:640px;margin:0 auto;background:#fff;border-radius:16px;border:1px solid var(--line);padding:32px;}
  h1{font-size:1.4rem;margin:0 0 4px;}
  .sub{color:var(--steel);font-size:0.9rem;margin:0 0 24px;}
  label{display:block;font-size:0.85rem;font-weight:bold;margin:16px 0 6px;}
  input,select{width:100%;padding:11px 12px;font-size:0.95rem;border:1px solid var(--line);border-radius:8px;background:var(--cream);font-family:inherit;}
  input:focus,select:focus{outline:2px solid var(--gold);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:560px){.grid2{grid-template-columns:1fr;}}
  button{margin-top:24px;width:100%;padding:15px;font-size:1rem;font-weight:bold;background:var(--gold);color:var(--ink);border:none;border-radius:10px;cursor:pointer;}
  button:disabled{opacity:0.6;cursor:wait;}
  .status{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:0.9rem;display:none;}
  .status.ok{display:block;background:rgba(34,160,90,0.1);border:1px solid rgba(34,160,90,0.4);color:#1E8E52;}
  .status.err{display:block;background:rgba(200,60,50,0.08);border:1px solid rgba(200,60,50,0.35);color:#C0392B;}
  .note{font-size:0.78rem;color:var(--steel);margin-top:6px;}
</style>
</head>
<body>
<div class="card">
  <h1>Send Customer Invoice</h1>
  <p class="sub">Internal tool — fills out and sends the branded invoice email with a Stripe payment button.</p>

  <label>Admin secret</label>
  <input type="password" id="secret" placeholder="Your INVOICE_SECRET value" autocomplete="current-password">

  <div class="grid2">
    <div>
      <label>Customer name</label>
      <input type="text" id="name" placeholder="Jane Smith">
    </div>
    <div>
      <label>Customer email</label>
      <input type="email" id="email" placeholder="jane@example.com">
    </div>
  </div>

  <label>Package</label>
  <select id="package">
    <option value="1 Bedroom — 20 Totes + Dolly" data-price="$99" data-stripe="">1 Bedroom — 20 Totes + Dolly — $99</option>
    <option value="2–3 Bedrooms — 40 Totes + 2 Dollies" data-price="$149" data-stripe="">2–3 Bedrooms — 40 Totes + 2 Dollies — $149</option>
    <option value="4+ Bedrooms — 60 Totes + 3 Dollies" data-price="$199" data-stripe="">4+ Bedrooms — 60 Totes + 3 Dollies — $199</option>
    <option value="Custom">Custom package</option>
  </select>

  <div class="grid2">
    <div>
      <label>Rental price</label>
      <input type="text" id="price" placeholder="$99">
    </div>
    <div>
      <label>Duration</label>
      <input type="text" id="duration" value="2 Weeks">
    </div>
  </div>

  <div class="grid2">
    <div>
      <label>Drop-off date</label>
      <input type="date" id="dropoffDate">
    </div>
    <div>
      <label>Drop-off time</label>
      <input type="time" id="dropoffTime" value="10:00">
    </div>
  </div>

  <div class="grid2">
    <div>
      <label>Pickup date</label>
      <input type="date" id="pickupDate">
    </div>
    <div>
      <label>Pickup time</label>
      <input type="time" id="pickupTime" value="10:00">
    </div>
  </div>

  <label>Street address</label>
  <input type="text" id="street" placeholder="123 Main St">

  <div class="grid2">
    <div>
      <label>City</label>
      <input type="text" id="city" placeholder="Oklahoma City">
    </div>
    <div class="grid2">
      <div>
        <label>State</label>
        <input type="text" id="state" value="OK">
      </div>
      <div>
        <label>Zip</label>
        <input type="text" id="zip" placeholder="73102" inputmode="numeric" maxlength="10">
      </div>
    </div>
  </div>

  <label>Stripe payment link</label>
  <input type="url" id="stripeUrl" placeholder="https://buy.stripe.com/...">
  <p class="note">Paste the Stripe Payment Link for this package. Tip: edit this file to hard-code your three links in the package dropdown (data-stripe attributes) so this auto-fills.</p>

  <button id="sendBtn">Send Invoice Email</button>
  <div class="status" id="status"></div>
</div>

<script>
  const $ = (id) => document.getElementById(id);

  // Auto-fill price + stripe link when a package is chosen
  $('package').addEventListener('change', (e) => {
    const opt = e.target.selectedOptions[0];
    if (opt.dataset.price) $('price').value = opt.dataset.price;
    if (opt.dataset.stripe) $('stripeUrl').value = opt.dataset.stripe;
  });

  $('sendBtn').addEventListener('click', async () => {
    const fields = ['secret','name','email','package','price','duration','dropoffDate','dropoffTime','pickupDate','pickupTime','street','city','state','zip','stripeUrl'];
    const payload = {};
    for (const f of fields) {
      payload[f] = $(f).value.trim();
      if (!payload[f]) return showStatus('err', 'Missing: ' + f);
    }

    // Compose the address parts into the single field the function expects
    payload.address = payload.street + ', ' + payload.city + ', ' + payload.state + ' ' + payload.zip;
    delete payload.street; delete payload.city; delete payload.state; delete payload.zip;

    // Convert 24h picker values ("14:30") to 12h display ("2:30 PM")
    payload.dropoffTime = to12Hour(payload.dropoffTime);
    payload.pickupTime = to12Hour(payload.pickupTime);

    const btn = $('sendBtn');
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
      const resp = await fetch('/.netlify/functions/send-invoice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (resp.ok) {
        showStatus('ok', 'Invoice sent to ' + payload.email + ' (BCC to you).');
      } else if (resp.status === 401) {
        showStatus('err', 'Wrong admin secret.');
      } else {
        const detail = await resp.text().catch(() => '');
        showStatus('err', 'Send failed (' + resp.status + '): ' + (detail || 'check function logs.'));
      }
    } catch (e) {
      showStatus('err', 'Network error — are you on the live site?');
    }
    btn.disabled = false; btn.textContent = 'Send Invoice Email';
  });

  function showStatus(kind, msg) {
    const s = $('status');
    s.className = 'status ' + kind;
    s.textContent = msg;
  }

  // "14:30" -> "2:30 PM", "09:00" -> "9:00 AM"
  function to12Hour(t) {
    const [h, m] = t.split(':').map(Number);
    if (isNaN(h) || isNaN(m)) return t;
    const period = h >= 12 ? 'PM' : 'AM';
    const hour = h % 12 || 12;
    return hour + ':' + String(m).padStart(2, '0') + ' ' + period;
  }
</script>
</body>
</html>
