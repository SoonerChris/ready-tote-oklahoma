<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" href="/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Add Rental — Ready Tote Oklahoma (Internal)</title>
<link rel="stylesheet" href="admin-shared.css">
<style>
  body{padding:32px 16px;}
  .card{padding:32px;}
</style>
</head>
<body>
<nav class="admin-nav" aria-label="Admin tools">
  <a href="admin.html">Dashboard</a>
  <a href="admin-invoice.html">Send Invoice</a>
  <a href="admin-add-rental.html" aria-current="page">Add Rental</a>
  <a href="admin-reminders.html">Reminders</a>
  <a href="admin-finance.html">Finance</a>
  <a href="admin-outreach.html">Outreach</a>
  <a href="admin-inventory.html">Inventory</a>
</nav>
<div class="card">
  <h1>Add Rental to Log</h1>
  <p class="sub">Records a rental directly — <strong>no email is sent</strong>. Use for backfilling bookings made before the log existed. Logged rentals feed the reminders page, review requests, and the sales CSV.</p>

  <label>Admin secret</label>
  <input type="password" id="secret" placeholder="Your INVOICE_SECRET value">

  <div class="grid2">
    <div>
      <label>Customer name</label>
      <input type="text" id="name" placeholder="Jane Smith">
    </div>
    <div>
      <label>Customer email (optional)</label>
      <input type="email" id="email" placeholder="jane@example.com">
    </div>
  </div>

  <div class="grid2">
    <div>
      <label>Customer phone</label>
      <input type="tel" id="phone" placeholder="405-555-0123">
    </div>
    <div>
      <label>Price</label>
      <input type="text" id="price" placeholder="$99">
    </div>
  </div>

  <label>Package</label>
  <input type="text" id="package" placeholder="1 Bedroom — 20 Totes + Dolly">

  <div class="grid2">
    <div>
      <label>Drop-off date</label>
      <input type="date" id="dropoffDate">
    </div>
    <div>
      <label>Drop-off time</label>
      <input type="time" id="dropoffTime" value="10:00">
    </div>
  </div>

  <div class="grid2">
    <div>
      <label>Pickup date</label>
      <input type="date" id="pickupDate">
    </div>
    <div>
      <label>Pickup time</label>
      <input type="time" id="pickupTime" value="10:00">
    </div>
  </div>

  <label>Service type</label>
  <select id="serviceType" style="width:100%;padding:11px 12px;font-size:0.95rem;border:1px solid var(--line);border-radius:8px;background:var(--cream);font-family:inherit;">
    <option value="delivery">We deliver & pick up (standard)</option>
    <option value="self">Customer picks up & returns totes</option>
  </select>

  <label>Drop-off address (optional)</label>
  <input type="text" id="dropoffAddress" placeholder="123 Main St, Oklahoma City, OK 73102">

  <label>Pickup address (optional)</label>
  <input type="text" id="pickupAddress" placeholder="456 Oak Ave, Moore, OK 73160">

  <button id="addBtn">Add to Rental Log</button>
  <div class="status" id="status"></div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  $('secret').value = sessionStorage.getItem('rto-admin-secret') || '';
  $('secret').addEventListener('input', () => sessionStorage.setItem('rto-admin-secret', $('secret').value));

  $('addBtn').addEventListener('click', async () => {
    const req = ['secret','name','phone','package','price','dropoffDate','pickupDate'];
    const payload = {};
    for (const f of req) {
      payload[f] = $(f).value.trim();
      if (!payload[f]) return showStatus('err', 'Missing: ' + f);
    }
    payload.dropoffTime = to12Hour($('dropoffTime').value || '10:00');
    payload.pickupTime = to12Hour($('pickupTime').value || '10:00');
    payload.serviceType = $('serviceType').value;
    payload.dropoffAddress = $('dropoffAddress').value.trim();
    payload.pickupAddress = $('pickupAddress').value.trim();
    payload.email = $('email').value.trim();

    const btn = $('addBtn');
    btn.disabled = true; btn.textContent = 'Adding…';
    try {
      const resp = await fetch('/.netlify/functions/add-rental', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (resp.ok) {
        showStatus('ok', 'Added ' + payload.name + '. Form cleared for the next one.');
        ['name','email','phone','package','price','dropoffDate','pickupDate','dropoffAddress','pickupAddress'].forEach(f => $(f).value = '');
      } else if (resp.status === 401) {
        showStatus('err', 'Wrong admin secret.');
      } else {
        const t = await resp.text().catch(() => '');
        showStatus('err', 'Failed (' + resp.status + '): ' + t);
      }
    } catch {
      showStatus('err', 'Network error — use this page on the live site.');
    }
    btn.disabled = false; btn.textContent = 'Add to Rental Log';
  });

  function to12Hour(t) {
    const [h, m] = t.split(':').map(Number);
    if (isNaN(h) || isNaN(m)) return t;
    const period = h >= 12 ? 'PM' : 'AM';
    const hour = h % 12 || 12;
    return hour + ':' + String(m).padStart(2, '0') + ' ' + period;
  }

  function showStatus(kind, msg) {
    const s = $('status');
    s.className = 'status ' + kind;
    s.textContent = msg;
  }
</script>
</body>
</html>
