<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" href="/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Tote Inventory — Ready Tote Oklahoma (Internal)</title>
<link rel="stylesheet" href="admin-shared.css">
<style>
  .stats{display:flex; gap:20px; flex-wrap:wrap;}
  .stats .stat{flex:1; min-width:120px;}
  .stats .num{font-size:1.4rem; font-weight:bold;}
  .stats .lbl{font-size:0.75rem; color:var(--steel);}
  .stats .num.warn{color:var(--red);}
  .stats .num.gold{color:var(--gold);}
  .stats .num.green{color:var(--green);}
</style>
</head>
<body>
<nav class="admin-nav" aria-label="Admin tools">
  <a href="admin.html">Dashboard</a>
  <a href="admin-invoice.html">Send Invoice</a>
  <a href="admin-add-rental.html">Add Rental</a>
  <a href="admin-reminders.html">Reminders</a>
  <a href="admin-finance.html">Finance</a>
  <a href="admin-outreach.html">Outreach</a>
  <a href="admin-inventory.html" aria-current="page">Inventory</a>
</nav>
<div class="card">
  <h1>Tote Inventory</h1>
  <p class="sub">Track totes owned and estimate how many are out on rental right now. "Out on rental" is estimated from tote counts parsed out of active rentals' package names.</p>

  <label>Admin secret</label>
  <input type="password" id="secret" placeholder="Your INVOICE_SECRET value">
  <button id="loadBtn">Load inventory</button>
  <div class="status" id="status"></div>

  <div id="results" style="display:none;">
    <div class="rem stats" id="statCards"></div>

    <h2>Log an event</h2>
    <div class="rem">
      <div class="grid2" style="gap:10px;">
        <input type="date" id="evDate">
        <select id="evType">
          <option value="purchased">Purchased new totes</option>
          <option value="returned-to-service">Repaired / returned to service</option>
          <option value="damaged">Damaged / retired from use</option>
          <option value="lost">Lost / not returned</option>
          <option value="retired">Retired (worn out)</option>
        </select>
      </div>
      <div class="grid2" style="gap:10px; margin-top:10px;">
        <input type="number" id="evQty" placeholder="Quantity" min="1" step="1">
        <input type="text" id="evNote" placeholder="Note (optional)">
      </div>
      <button type="button" id="evAddBtn">Add event</button>
    </div>

    <h2>History</h2>
    <div id="evList"></div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  $('secret').value = sessionStorage.getItem('rto-admin-secret') || '';
  $('secret').addEventListener('input', () => sessionStorage.setItem('rto-admin-secret', $('secret').value));
  $('evDate').value = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Chicago' });

  const ADD_TYPES = ['purchased', 'returned-to-service'];
  let EVENTS = [];
  let ACTIVE_RENTALS = [];

  $('loadBtn').addEventListener('click', load);
  if ($('secret').value) load();

  async function load() {
    const secret = $('secret').value.trim();
    if (!secret) return showErr('Enter the admin secret.');
    const btn = $('loadBtn');
    btn.disabled = true; btn.textContent = 'Loading…';
    try {
      const [invResp, rentalsResp] = await Promise.all([
        invCall({ action: 'list' }),
        fetch('/.netlify/functions/get-rentals', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret }),
        }),
      ]);
      if (invResp.status === 401 || rentalsResp.status === 401) return showErr('Wrong admin secret.');
      if (!invResp.ok || !rentalsResp.ok) return showErr('Load failed.');

      const id = await invResp.json();
      const rd = await rentalsResp.json();
      EVENTS = id.events || [];

      const today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Chicago' });
      ACTIVE_RENTALS = (rd.rentals || []).filter(r => r.dropoffDate <= today && r.pickupDate >= today);

      render();
      $('results').style.display = 'block';
      $('status').style.display = 'none';
    } catch { showErr('Network error — use this page on the live site.'); }
    btn.disabled = false; btn.textContent = 'Load inventory';
  }

  function totesInPackage(pkg) {
    const m = String(pkg || '').match(/(\d+)\s*totes?/i);
    return m ? parseInt(m[1], 10) : 0;
  }

  function render() {
    const totalOwned = EVENTS.reduce((t, e) => t + (ADD_TYPES.includes(e.type) ? e.quantity : -e.quantity), 0);
    const deployed = ACTIVE_RENTALS.reduce((t, r) => t + totesInPackage(r.package), 0);
    const available = totalOwned - deployed;

    $('statCards').innerHTML = `
      <div class="stat"><div class="num">${totalOwned}</div><div class="lbl">Total owned</div></div>
      <div class="stat"><div class="num gold">${deployed}</div><div class="lbl">Out on rental (est.)</div></div>
      <div class="stat"><div class="num ${available < 0 ? 'warn' : 'green'}">${available}</div><div class="lbl">Available now</div></div>
      <div class="stat"><div class="num">${ACTIVE_RENTALS.length}</div><div class="lbl">Active rentals</div></div>
    `;

    const sorted = [...EVENTS].sort((a, b) => (b.date + b.key).localeCompare(a.date + a.key));
    $('evList').innerHTML = sorted.length ? sorted.map(e => {
      const sign = ADD_TYPES.includes(e.type) ? '+' : '−';
      const color = ADD_TYPES.includes(e.type) ? 'var(--green)' : 'var(--red)';
      return `
      <div class="rem" style="padding:10px 14px; display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <div>
          <div style="font-weight:bold; font-size:0.9rem;"><span style="color:${color};">${sign}${e.quantity}</span> — ${esc(labelFor(e.type))}</div>
          <div style="font-size:0.78rem; color:var(--steel); margin:0;">${esc(fmtDate(e.date))}${e.note ? ' · ' + esc(e.note) : ''}</div>
        </div>
        <button type="button" style="width:auto; margin:0; padding:6px 12px; font-size:0.75rem; background:rgba(200,60,50,0.1); color:#C0392B; border:1px solid rgba(200,60,50,0.35); border-radius:8px;"
          onclick="invDelete('${esc(e.key)}')">Delete</button>
      </div>`;
    }).join('') : '<p class="empty">No inventory events logged yet.</p>';
  }

  function labelFor(type) {
    return {
      purchased: 'Purchased new totes',
      'returned-to-service': 'Repaired / returned to service',
      damaged: 'Damaged / retired from use',
      lost: 'Lost / not returned',
      retired: 'Retired (worn out)',
    }[type] || type;
  }

  const invCall = (payload) => fetch('/.netlify/functions/tote-stock', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ secret: $('secret').value.trim(), ...payload }),
  });

  async function reload() {
    const resp = await invCall({ action: 'list' });
    if (resp.ok) { const d = await resp.json(); EVENTS = d.events || []; render(); }
  }

  $('evAddBtn').addEventListener('click', async () => {
    const date = $('evDate').value, type = $('evType').value,
          quantity = $('evQty').value, note = $('evNote').value.trim();
    if (!date || !quantity) return showErr('Event needs a date and quantity.');
    const resp = await invCall({ action: 'add', date, type, quantity, note });
    if (resp.ok) { $('evQty').value = ''; $('evNote').value = ''; $('status').style.display = 'none'; reload(); }
    else showErr('Add event failed.');
  });

  window.invDelete = async (key) => {
    if (!confirm('Delete this event?')) return;
    const resp = await invCall({ action: 'delete', key });
    if (resp.ok) reload(); else showErr('Delete failed.');
  };

  function fmtDate(iso) {
    if (!iso) return '';
    const parts = String(iso).slice(0, 10).split('-');
    if (parts.length !== 3) return iso;
    const [y, m, d] = parts;
    return m + '/' + d + '/' + y.slice(2);
  }
  function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
  function showErr(m) { const s = $('status'); s.className = 'status err'; s.textContent = m; }
</script>
</body>
</html>
