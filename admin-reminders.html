<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Today's Reminders — Ready Tote Oklahoma (Internal)</title>
<style>
  :root{--ink:#1E1B18;--gold:#C99A32;--cream:#F5F1E7;--steel:#6B6259;--line:rgba(30,27,24,0.15);--green:#1E8E52;}
  *{box-sizing:border-box;}
  body{font-family:Arial,Helvetica,sans-serif;background:var(--cream);color:var(--ink);margin:0;padding:24px 14px;}
  .card{max-width:640px;margin:0 auto;background:#fff;border-radius:16px;border:1px solid var(--line);padding:26px;}
  h1{font-size:1.3rem;margin:0 0 4px;}
  .sub{color:var(--steel);font-size:0.88rem;margin:0 0 20px;}
  label{display:block;font-size:0.85rem;font-weight:bold;margin:14px 0 6px;}
  input{width:100%;padding:11px 12px;font-size:0.95rem;border:1px solid var(--line);border-radius:8px;background:var(--cream);}
  button{margin-top:14px;width:100%;padding:13px;font-size:0.95rem;font-weight:bold;background:var(--gold);color:var(--ink);border:none;border-radius:10px;cursor:pointer;}
  button:disabled{opacity:0.6;}
  h2{font-size:1rem;margin:26px 0 10px;}
  .rem{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
  .rem .who{font-weight:bold;}
  .rem .meta{color:var(--steel);font-size:0.82rem;margin:4px 0 10px;}
  .rem .msg{background:var(--cream);border-radius:8px;padding:10px 12px;font-size:0.85rem;color:var(--ink);margin-bottom:10px;}
  .sms-btn{display:inline-block;background:var(--green);color:#fff;font-weight:bold;text-decoration:none;padding:10px 20px;border-radius:8px;font-size:0.88rem;}
  .empty{color:var(--steel);font-size:0.88rem;}
  .status{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:0.88rem;display:none;}
  .status.err{display:block;background:rgba(200,60,50,0.08);border:1px solid rgba(200,60,50,0.35);color:#C0392B;}
</style>
</head>
<body>
<div class="card">
  <h1>Today's Reminder Texts</h1>
  <p class="sub">Tap a green button to open Messages with the text pre-filled. Best used on your phone.</p>

  <label>Admin secret</label>
  <input type="password" id="secret" placeholder="Your INVOICE_SECRET value">
  <button id="loadBtn">Load today's reminders</button>
  <div class="status" id="status"></div>

  <div id="results" style="display:none;">
    <h2>🚚 Delivery tomorrow</h2>
    <div id="delivery"></div>
    <h2>📦 Pickup in 2 days</h2>
    <div id="pickup"></div>
    <h2>⭐ Review requests (picked up 3 days ago)</h2>
    <div id="review"></div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);

  $('loadBtn').addEventListener('click', async () => {
    const secret = $('secret').value.trim();
    if (!secret) return showErr('Enter the admin secret.');
    const btn = $('loadBtn');
    btn.disabled = true; btn.textContent = 'Loading…';
    try {
      const resp = await fetch('/.netlify/functions/get-rentals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret }),
      });
      if (resp.status === 401) { showErr('Wrong admin secret.'); }
      else if (!resp.ok) { showErr('Load failed (' + resp.status + ').'); }
      else {
        const data = await resp.json();
        render('delivery', data.reminders.delivery);
        render('pickup', data.reminders.pickup);
        render('review', data.reminders.review);
        $('results').style.display = 'block';
        $('status').style.display = 'none';
      }
    } catch { showErr('Network error — use this page on the live site.'); }
    btn.disabled = false; btn.textContent = 'Load today\'s reminders';
  });

  function render(id, items) {
    const el = $(id);
    if (!items.length) { el.innerHTML = '<p class="empty">None today.</p>'; return; }
    el.innerHTML = items.map(r => `
      <div class="rem">
        <div class="who">${esc(r.name)} — ${esc(r.phone)}</div>
        <div class="meta">${esc(r.package)} · ${esc(r.address)}</div>
        <div class="msg">${esc(r.message)}</div>
        <a class="sms-btn" href="${r.sms}">Text ${esc(r.name.split(' ')[0])} →</a>
      </div>`).join('');
  }

  function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML;}
  function showErr(m){const s=$('status');s.className='status err';s.textContent=m;}
</script>
</body>
</html>
