<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" href="/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Finance — Ready Tote Oklahoma (Internal)</title>
<link rel="stylesheet" href="admin-shared.css">
</head>
<body>
<nav class="admin-nav" aria-label="Admin tools">
  <a href="admin.html">Dashboard</a>
  <a href="admin-invoice.html">Send Invoice</a>
  <a href="admin-add-rental.html">Add Rental</a>
  <a href="admin-reminders.html">Reminders</a>
  <a href="admin-finance.html" aria-current="page">Finance</a>
  <a href="admin-outreach.html">Outreach</a>
</nav>
<div class="card">
  <h1>Finance</h1>
  <p class="sub">Sales totals, expenses, and mileage. All amounts in USD.</p>

  <label>Admin secret</label>
  <input type="password" id="secret" placeholder="Your INVOICE_SECRET value">
  <button id="loadBtn">Load finance data</button>
  <div class="status" id="status"></div>

  <div id="results" style="display:none;">
    <h2>💰 Sales</h2>
    <div class="rem" id="salesSummary" style="display:flex; gap:20px; flex-wrap:wrap;"></div>
    <div id="salesByMonth"></div>
    <div class="grid2" id="salesDetails">
      <div>
        <h3 style="font-size:0.88rem; margin:16px 0 8px;">📦 By Package</h3>
        <div id="salesByPackage"></div>
      </div>
      <div>
        <h3 style="font-size:0.88rem; margin:16px 0 8px;">🕐 Recent Rentals</h3>
        <div id="recentRentals"></div>
      </div>
    </div>
    <button type="button" id="csvBtn" style="background:var(--ink); color:#fff; margin-top:14px;">Download rental log (CSV)</button>

    <h2>💵 Expenses</h2>
    <div class="rem" id="expTotals" style="display:flex; gap:20px; flex-wrap:wrap;"></div>
    <div class="rem">
      <div class="grid2" style="gap:10px;">
        <input type="date" id="expDate">
        <select id="expCategory">
          <option>Equipment</option><option>Supplies</option><option>Fuel</option>
          <option>Software &amp; Fees</option><option>Insurance</option><option>Marketing</option><option>Other</option>
        </select>
        <select id="expRecurring">
          <option value="one-time">One-time cost</option>
          <option value="monthly">Recurring — monthly</option>
          <option value="yearly">Recurring — yearly</option>
        </select>
        <input type="number" id="expAmount" placeholder="Amount ($)" step="0.01" min="0">
      </div>
      <div class="grid2" style="gap:10px; margin-top:10px;">
        <input type="text" id="expVendor" placeholder="Vendor (e.g., Amazon, Home Depot)">
        <select id="expPayment" style="width:100%;padding:11px 12px;font-size:0.95rem;border:1px solid var(--line);border-radius:8px;background:var(--cream);">
          <option value="">Payment method…</option>
          <option>Prime CC</option>
          <option>AAdvantage CC</option>
          <option>TFCU CC</option>
          <option>Other</option>
        </select>
      </div>
      <input type="text" id="expDesc" placeholder="Description / notes (optional)" style="margin-top:10px;">
      <button type="button" id="expAddBtn">Add expense</button>
    </div>
    <div id="expList"></div>
    <button type="button" id="expCsvBtn" style="background:var(--ink); color:#fff;">Download expenses (CSV)</button>

    <h2>🚗 Mileage</h2>
    <div class="rem" id="mileTotals" style="display:flex; gap:20px; flex-wrap:wrap; align-items:center;"></div>
    <div class="rem">
      <p class="empty" style="margin:0 0 8px;">Quick-fill from recent trips:</p>
      <div id="tripChips" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;"></div>
      <div class="grid2" style="gap:10px;">
        <input type="date" id="mileDate">
        <input type="number" id="mileMiles" placeholder="Miles" step="0.1" min="0">
      </div>
      <input type="text" id="milePurpose" placeholder="Purpose (e.g., Deliver — Jane Smith, Moore)" style="margin-top:10px;">
      <button type="button" id="mileAddBtn">Add trip</button>
    </div>
    <div id="mileList"></div>
    <button type="button" id="mileCsvBtn" style="background:var(--ink); color:#fff;">Download mileage (CSV)</button>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);

  // Restore shared secret from admin hub
  $('secret').value = sessionStorage.getItem('rto-admin-secret') || '';
  $('secret').addEventListener('input', () => sessionStorage.setItem('rto-admin-secret', $('secret').value));

  let ALL_RENTALS = [];
  let FIN = { expenses: [], mileage: [], mileageRate: null };

  $('loadBtn').addEventListener('click', load);
  // Auto-load if a secret is already saved (matches admin.html behavior)
  if ($('secret').value) load();

  async function load() {
    const secret = $('secret').value.trim();
    if (!secret) return showErr('Enter the admin secret.');
    const btn = $('loadBtn');
    btn.disabled = true; btn.textContent = 'Loading…';
    try {
      const [rentalsResp, finResp] = await Promise.all([
        fetch('/.netlify/functions/get-rentals', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret }),
        }),
        fetch('/.netlify/functions/finance', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret, action: 'list' }),
        }),
      ]);
      if (rentalsResp.status === 401 || finResp.status === 401) { showErr('Wrong admin secret.'); }
      else if (!rentalsResp.ok || !finResp.ok) { showErr('Load failed.'); }
      else {
        const rd = await rentalsResp.json();
        ALL_RENTALS = rd.rentals || [];
        FIN = await finResp.json();
        renderSales(ALL_RENTALS);
        renderFinance();
        $('results').style.display = 'block';
        $('status').style.display = 'none';
      }
    } catch { showErr('Network error — use this page on the live site.'); }
    btn.disabled = false; btn.textContent = 'Load finance data';
  }

  function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML;}
  function fmtDate(iso) {
    if (!iso) return '';
    const parts = String(iso).slice(0, 10).split('-');
    if (parts.length !== 3) return iso;
    const [y, m, d] = parts;
    return m + '/' + d + '/' + y.slice(2);
  }
  function fmtPrice(p){ const s=String(p||'').trim(); return s ? (s.startsWith('$') ? esc(s) : '$'+esc(s)) : ''; }
  function showErr(m){const s=$('status');s.className='status err';s.textContent=m;}
  function thisYear(d){ return (d||'').slice(0,4) === String(new Date().getFullYear()); }
  const money = n => '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

  function priceNum(p){ const m = String(p||'').replace(/[^0-9.]/g,''); return m ? parseFloat(m) : 0; }
  function renderSales(rentals){
    const now = new Date();
    const thisMonth = now.toISOString().slice(0,7);
    const thisYear = now.getFullYear().toString();
    const today = now.toLocaleDateString('en-CA', { timeZone: 'America/Chicago' });

    const pn = p => { const m = String(p||'').replace(/[^0-9.]/g,''); return m ? parseFloat(m) : 0; };
    const sum = arr => arr.reduce((t,r) => t + pn(r.price), 0);
    const fmt = n => '$' + n.toLocaleString('en-US', {maximumFractionDigits:0});

    const monthRentals = rentals.filter(r => (r.invoicedAt||'').slice(0,7) === thisMonth);
    const ytdRentals = rentals.filter(r => (r.invoicedAt||'').slice(0,4) === thisYear);
    const activeRentals = rentals.filter(r => r.dropoffDate <= today && r.pickupDate >= today);
    const avgValue = rentals.length ? sum(rentals) / rentals.length : 0;

    // Previous month comparison
    const prevDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const prevMonth = prevDate.toISOString().slice(0,7);
    const prevRentals = rentals.filter(r => (r.invoicedAt||'').slice(0,7) === prevMonth);
    const monthDiff = sum(monthRentals) - sum(prevRentals);
    const monthDiffPct = sum(prevRentals) > 0 ? ((monthDiff / sum(prevRentals)) * 100).toFixed(0) : null;

    // Summary cards
    $('salesSummary').innerHTML = `
      <div><div style="font-size:1.3rem;font-weight:bold;color:var(--green);">${activeRentals.length}</div><div style="font-size:0.72rem;color:var(--steel);">Active Now</div></div>
      <div><div style="font-size:1.3rem;font-weight:bold;">${monthRentals.length}</div><div style="font-size:0.72rem;color:var(--steel);">This Month</div></div>
      <div><div style="font-size:1.3rem;font-weight:bold;color:var(--gold);">${fmt(sum(monthRentals))}</div><div style="font-size:0.72rem;color:var(--steel);">Month Revenue</div></div>
      <div><div style="font-size:1.3rem;font-weight:bold;">${ytdRentals.length}</div><div style="font-size:0.72rem;color:var(--steel);">YTD Rentals</div></div>
      <div><div style="font-size:1.3rem;font-weight:bold;color:var(--gold);">${fmt(sum(ytdRentals))}</div><div style="font-size:0.72rem;color:var(--steel);">YTD Revenue</div></div>
      <div><div style="font-size:1.3rem;font-weight:bold;">${rentals.length}</div><div style="font-size:0.72rem;color:var(--steel);">All Time</div></div>
      <div><div style="font-size:1.3rem;font-weight:bold;color:var(--gold);">${fmt(sum(rentals))}</div><div style="font-size:0.72rem;color:var(--steel);">Total Invoiced</div></div>
      <div><div style="font-size:1.3rem;font-weight:bold;">${fmt(avgValue)}</div><div style="font-size:0.72rem;color:var(--steel);">Avg Order</div></div>
    `;

    // Monthly revenue (last 6 months)
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push(d.toISOString().slice(0,7));
    }
    const monthlyData = months.map(m => {
      const mrs = rentals.filter(r => (r.invoicedAt||'').slice(0,7) === m);
      return { month: m, count: mrs.length, revenue: sum(mrs) };
    });
    const maxRev = Math.max(...monthlyData.map(m => m.revenue), 1);
    const monthLabel = m => {
      const d = new Date(m + '-01T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'short' });
    };

    $('salesByMonth').innerHTML = `
      <h3 style="font-size:0.88rem; margin:16px 0 8px;">📊 Monthly Revenue (Last 6 Months)${monthDiffPct !== null ? ` <span style="font-size:0.75rem; color:${monthDiff >= 0 ? 'var(--green)' : 'var(--red)'}; margin-left:8px;">${monthDiff >= 0 ? '▲' : '▼'} ${Math.abs(monthDiffPct)}% vs last month</span>` : ''}</h3>
      <div style="display:flex; align-items:flex-end; gap:8px; height:120px; padding:8px 0; border-bottom:1px solid var(--line);">
        ${monthlyData.map(m => `
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">
            <div style="font-size:0.7rem; font-weight:bold; color:var(--ink);">${m.revenue > 0 ? fmt(m.revenue) : ''}</div>
            <div style="width:100%; max-width:50px; background:${m.month === thisMonth ? 'var(--gold)' : 'var(--cream)'}; border:1px solid ${m.month === thisMonth ? 'var(--gold)' : 'var(--line)'}; border-radius:4px 4px 0 0; height:${Math.max(m.revenue / maxRev * 80, 4)}px;"></div>
            <div style="font-size:0.68rem; color:var(--steel);">${monthLabel(m.month)}</div>
            <div style="font-size:0.65rem; color:var(--steel);">${m.count} rental${m.count !== 1 ? 's' : ''}</div>
          </div>
        `).join('')}
      </div>`;

    // By package type
    const byPkg = {};
    for (const r of rentals) {
      const pkg = r.package || 'Unknown';
      if (!byPkg[pkg]) byPkg[pkg] = { count: 0, revenue: 0 };
      byPkg[pkg].count++;
      byPkg[pkg].revenue += pn(r.price);
    }
    const pkgEntries = Object.entries(byPkg).sort((a,b) => b[1].revenue - a[1].revenue);
    $('salesByPackage').innerHTML = pkgEntries.length ? pkgEntries.map(([pkg, d]) => `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--line); font-size:0.82rem;">
        <div>
          <div style="font-weight:bold;">${esc(pkg)}</div>
          <div style="color:var(--steel); font-size:0.75rem;">${d.count} rental${d.count !== 1 ? 's' : ''}</div>
        </div>
        <div style="font-weight:bold; color:var(--gold);">${fmt(d.revenue)}</div>
      </div>`).join('') : '<div style="color:var(--steel);font-size:0.82rem;">No data yet.</div>';

    // Recent rentals (last 8)
    const recent = [...rentals].sort((a,b) => (b.invoicedAt||'').localeCompare(a.invoicedAt||'')).slice(0, 8);
    $('recentRentals').innerHTML = recent.length ? recent.map(r => {
      const invoiceDate = fmtDate((r.invoicedAt||'').slice(0,10));
      const isActive = r.dropoffDate <= today && r.pickupDate >= today;
      const isPast = r.pickupDate < today;
      const status = isActive ? '<span style="color:var(--green);font-size:0.7rem;font-weight:bold;">● Active</span>'
                   : isPast ? '<span style="color:var(--steel);font-size:0.7rem;">Completed</span>'
                   : '<span style="color:var(--gold);font-size:0.7rem;font-weight:bold;">Upcoming</span>';
      return `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--line); font-size:0.82rem;">
        <div>
          <div style="font-weight:bold;">${esc(r.name)} ${status}</div>
          <div style="color:var(--steel); font-size:0.75rem;">${esc(invoiceDate)} · ${esc(r.package || '')}</div>
        </div>
        <div style="font-weight:bold;">${fmtPrice(r.price)}</div>
      </div>`;
    }).join('') : '<div style="color:var(--steel);font-size:0.82rem;">No rentals yet.</div>';
  }

  $('csvBtn').addEventListener('click', () => {
    if (!ALL_RENTALS.length) return showErr('No rentals to export yet.');
    const cols = ['invoicedAt','name','email','phone','package','price','duration','dropoffDate','dropoffTime','dropoffAddress','pickupDate','pickupTime','pickupAddress'];
    const rows = [...ALL_RENTALS].sort((a,b) => (b.invoicedAt||'').localeCompare(a.invoicedAt||''))
      .map(r => ({ ...r, invoicedAt: fmtDate((r.invoicedAt||'').slice(0,10)), dropoffDate: fmtDate(r.dropoffDate), pickupDate: fmtDate(r.pickupDate) }));
    dlCsv('ready-tote-rentals', cols, rows);
  });

  // ---- Finance ----
  const finCall = (payload) => fetch('/.netlify/functions/finance', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ secret: $('secret').value.trim(), ...payload }),
  });
  async function reloadFinance(){
    const resp = await finCall({ action: 'list' });
    if (resp.ok) { FIN = await resp.json(); renderFinance(); }
  }

  function renderFinance() {
    const ytdExp = FIN.expenses.filter(e => thisYear(e.date));
    let ytdTotal = 0, monthlyOverhead = 0;
    const byCat = {};
    for (const e of FIN.expenses) {
      if (e.recurring === 'monthly') monthlyOverhead += e.amount;
      else if (e.recurring === 'yearly') monthlyOverhead += e.amount / 12;
    }
    for (const e of ytdExp) {
      ytdTotal += e.amount;
      const b = byCat[e.category] || { oneTime: 0, monthly: 0 };
      if (e.recurring === 'one-time' || !e.recurring) b.oneTime += e.amount;
      else b.monthly += e.amount;
      byCat[e.category] = b;
    }
    $('expTotals').innerHTML =
      `<div><div style="font-size:1.2rem;font-weight:bold;">${money(ytdTotal)}</div><div style="font-size:0.75rem;color:var(--steel);">YTD expenses</div></div>` +
      `<div><div style="font-size:1.2rem;font-weight:bold;color:var(--gold);">${money(monthlyOverhead)}/mo</div><div style="font-size:0.75rem;color:var(--steel);">Est. monthly overhead</div></div>` +
      Object.entries(byCat).map(([cat,amt]) => {
        const sub = amt.monthly > 0 && amt.oneTime > 0 ? `${money(amt.oneTime)} + ${money(amt.monthly)} recurring`
                  : amt.monthly > 0 ? `${money(amt.monthly)} recurring` : money(amt.oneTime);
        return `<div><div style="font-size:0.9rem;font-weight:bold;">${sub}</div><div style="font-size:0.72rem;color:var(--steel);">${esc(cat)}</div></div>`;
      }).join('');

    const expSorted = [...FIN.expenses].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    $('expList').innerHTML = expSorted.slice(0,15).map(e => `
      <div class="rem" style="padding:10px 14px; display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <div>
          <div style="font-weight:bold; font-size:0.9rem;">${money(e.amount)} — ${esc(e.category)}${(e.recurring === 'monthly' || e.recurring === 'yearly') ? ` <span style="font-weight:normal; font-size:0.72rem; color:var(--gold); background:rgba(201,154,50,0.12); border:1px solid rgba(201,154,50,0.4); padding:1px 8px; border-radius:999px; margin-left:6px; vertical-align:middle;">${e.recurring}</span>` : ''}</div>
          <div style="font-size:0.78rem; color:var(--steel); margin:0;">${esc(fmtDate(e.date))}${e.vendor ? ' · ' + esc(e.vendor) : ''}${e.paymentMethod ? ' · ' + esc(e.paymentMethod) : ''}${e.description ? ' · ' + esc(e.description) : ''}</div>
        </div>
        <button type="button" style="width:auto; margin:0; padding:6px 12px; font-size:0.75rem; background:rgba(200,60,50,0.1); color:#C0392B; border:1px solid rgba(200,60,50,0.35); border-radius:8px;"
          onclick="finDelete('${esc(e.key)}')">Delete</button>
      </div>`).join('') || '<p class="empty">No expenses logged yet.</p>';

    const ytdMiles = FIN.mileage.filter(m => thisYear(m.date)).reduce((t,m)=>t+m.miles,0);
    const rate = FIN.mileageRate;
    $('mileTotals').innerHTML =
      `<div><div style="font-size:1.2rem;font-weight:bold;">${ytdMiles.toLocaleString('en-US',{maximumFractionDigits:1})} mi</div><div style="font-size:0.75rem;color:var(--steel);">YTD business miles</div></div>` +
      (rate ? `<div><div style="font-size:1.2rem;font-weight:bold;">${money(ytdMiles*rate)}</div><div style="font-size:0.75rem;color:var(--steel);">Est. deduction @ $${rate}/mi</div></div>` : '') +
      `<div style="display:flex; align-items:center; gap:6px;">
        <input type="number" id="rateInput" step="0.005" min="0" placeholder="Rate $/mi" value="${rate ?? ''}" style="width:110px; padding:8px 10px;">
        <button type="button" onclick="saveRate()" style="width:auto; margin:0; padding:8px 14px; font-size:0.8rem;">Save rate</button>
      </div>`;

    const today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Chicago' });
    const lo = new Date(today+'T12:00:00Z'); lo.setUTCDate(lo.getUTCDate()-7);
    const hi = new Date(today+'T12:00:00Z'); hi.setUTCDate(hi.getUTCDate()+7);
    const loS = lo.toISOString().slice(0,10), hiS = hi.toISOString().slice(0,10);
    const trips = [];
    for (const r of ALL_RENTALS) {
      if (r.serviceType === 'self') continue;
      if (r.dropoffDate >= loS && r.dropoffDate <= hiS)
        trips.push({ date: r.dropoffDate, purpose: 'Deliver — ' + r.name + (r.dropoffAddress||r.address ? ', ' + (r.dropoffAddress||r.address) : '') });
      if (r.pickupDate >= loS && r.pickupDate <= hiS)
        trips.push({ date: r.pickupDate, purpose: 'Pick up — ' + r.name + (r.pickupAddress||r.address ? ', ' + (r.pickupAddress||r.address) : '') });
    }
    trips.sort((a,b)=>b.date.localeCompare(a.date));
    $('tripChips').innerHTML = trips.slice(0,8).map(t => `
      <button type="button" style="width:auto; margin:0; padding:7px 12px; font-size:0.75rem; background:var(--cream); color:var(--ink); border:1px solid var(--line); border-radius:999px;"
        onclick="fillTrip('${esc(t.date)}', '${esc(t.purpose).replaceAll("'","&#39;")}')">${esc(fmtDate(t.date).slice(0,5))} · ${esc(t.purpose.slice(0,34))}${t.purpose.length>34?'…':''}</button>`).join('')
      || '<span class="empty">No rental trips in the last/next 7 days.</span>';

    const mileSorted = [...FIN.mileage].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    $('mileList').innerHTML = mileSorted.slice(0,15).map(m => `
      <div class="rem" style="padding:10px 14px; display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <div>
          <div style="font-weight:bold; font-size:0.9rem;">${m.miles} mi</div>
          <div style="font-size:0.78rem; color:var(--steel); margin:0;">${esc(fmtDate(m.date))} · ${esc(m.purpose)}</div>
        </div>
        <button type="button" style="width:auto; margin:0; padding:6px 12px; font-size:0.75rem; background:rgba(200,60,50,0.1); color:#C0392B; border:1px solid rgba(200,60,50,0.35); border-radius:8px;"
          onclick="finDelete('${esc(m.key)}')">Delete</button>
      </div>`).join('') || '<p class="empty">No trips logged yet.</p>';
  }

  window.fillTrip = (date, purpose) => { $('mileDate').value = date; $('milePurpose').value = purpose; $('mileMiles').focus(); };
  window.finDelete = async (key) => {
    if (!confirm('Delete this entry?')) return;
    const resp = await finCall({ action: 'delete', key });
    if (resp.ok) reloadFinance(); else showErr('Delete failed.');
  };
  window.saveRate = async () => {
    const rate = document.getElementById('rateInput').value;
    const resp = await finCall({ action: 'setRate', rate });
    if (resp.ok) reloadFinance(); else showErr('Rate must be $/mile, like 0.70.');
  };

  $('expAddBtn').addEventListener('click', async () => {
    const date = $('expDate').value, category = $('expCategory').value,
          description = $('expDesc').value.trim(), amount = $('expAmount').value,
          recurring = $('expRecurring').value, vendor = $('expVendor').value.trim(),
          paymentMethod = $('expPayment').value;
    if (!date || !amount) return showErr('Expense needs a date and amount.');
    const resp = await finCall({ action: 'addExpense', date, category, description, amount, recurring, vendor, paymentMethod });
    if (resp.ok) { $('expDesc').value=''; $('expAmount').value=''; $('expVendor').value=''; reloadFinance(); }
    else showErr('Add expense failed.');
  });
  $('mileAddBtn').addEventListener('click', async () => {
    const date = $('mileDate').value, purpose = $('milePurpose').value.trim(), miles = $('mileMiles').value;
    if (!date || !purpose || !miles) return showErr('Trip needs date, purpose, and miles.');
    const resp = await finCall({ action: 'addMileage', date, purpose, miles });
    if (resp.ok) { $('milePurpose').value=''; $('mileMiles').value=''; reloadFinance(); }
    else showErr('Add trip failed.');
  });

  function dlCsv(name, cols, rows){
    const cell = v => '"' + String(v ?? '').replaceAll('"','""') + '"';
    const lines = [cols.join(',')].concat(rows.map(r => cols.map(cc => cell(r[cc])).join(',')));
    const blob = new Blob([lines.join('\r\n')], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name + '-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click(); URL.revokeObjectURL(a.href);
  }
  $('expCsvBtn').addEventListener('click', () =>
    dlCsv('ready-tote-expenses', ['date','category','vendor','recurring','paymentMethod','description','amount'],
      [...FIN.expenses].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(e => ({ ...e, date: fmtDate(e.date) }))));
  $('mileCsvBtn').addEventListener('click', () =>
    dlCsv('ready-tote-mileage', ['date','purpose','miles'],
      [...FIN.mileage].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(m => ({ ...m, date: fmtDate(m.date) }))));
</script>
</body>
</html>
